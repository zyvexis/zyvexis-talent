<svg width="420" height="100" viewBox="0 0 420 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zyvexis Talent Solutions</title>
  <desc id="desc">A premium brand logo with an abstract network icon and wordmark.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2C36B"/>
      <stop offset="55%" stop-color="#C9A86A"/>
      <stop offset="100%" stop-color="#A67C32"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g transform="translate(10 10)" filter="url(#softShadow)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#dark)"/>
    <circle cx="28" cy="44" r="5.2" fill="url(#gold)"/>
    <circle cx="52" cy="26" r="5.2" fill="url(#gold)"/>
    <circle cx="52" cy="62" r="5.2" fill="url(#gold)"/>
    <path d="M28 44 L52 26 M28 44 L52 62 M52 26 L52 62" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="40" cy="44" r="2.5" fill="#F7E6B1"/>
  </g>

  <g transform="translate(110 0)">
    <text x="0" y="48" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="800" letter-spacing="-0.8" fill="#111111">Zyvexis</text>
    <text x="1" y="74" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="3.4" fill="#7A7A7A">TALENT SOLUTIONS</text>
  </g>
</svg>

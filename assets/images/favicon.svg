<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Zyvexis Logo Icon</title>
  <desc id="desc">A simplified premium brand logo showing only the abstract network icon.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2C36B"/>
      <stop offset="55%" stop-color="#C9A86A"/>
      <stop offset="100%" stop-color="#A67C32"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(10 10)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#dark)"/>
    <circle cx="28" cy="44" r="5.2" fill="url(#gold)"/>
    <circle cx="52" cy="26" r="5.2" fill="url(#gold)"/>
    <circle cx="52" cy="62" r="5.2" fill="url(#gold)"/>
    <path d="M28 44 L52 26 M28 44 L52 62 M52 26 L52 62" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="40" cy="44" r="2.5" fill="#F7E6B1"/>
  </g>
</svg>
